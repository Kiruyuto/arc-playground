# https://github.com/actions/actions-runner-controller/blob/master/charts/gha-runner-scale-set-controller/values.yaml
# Default values for gha-runner-scale-set-controller.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
labels: {}

# leaderElection will be enabled when replicaCount>1,
# So, only one replica will in charge of reconciliation at a given time
# leaderElectionId will be set to {{ define gha-runner-scale-set-controller.fullname }}.
replicaCount: 1

image:
  repository: "ghcr.io/actions/gha-runner-scale-set-controller"
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Define environment variables for the controller pod
env:

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

# We usually recommend not to specify default resources and to leave this as a conscious choice for the user.
# This also increases chances charts run on environments with little resources, such as Minikube.
# If you do want to specify resources, uncomment the following lines, adjust them as necessary, and remove the curly braces after 'resources:'.
resources: {}
# limits:
#   cpu: 1
#   memory: 2Gi
# requests:
#   cpu: 100m
#   memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
volumes: []
volumeMounts: []
priorityClassName: ""

# Metrics are enabled so Prometheus can scrape controller + listener endpoints.
metrics:
  controllerManagerAddr: ":8080"
  listenerAddr: ":8080"
  listenerEndpoint: "/metrics"

flags:
  # Log level can be set here with one of the following values: "debug", "info", "warn", "error".
  logLevel: "info"
  # Log format can be set with one of the following values: "text", "json"
  logFormat: "text"

  # The maximum number of concurrent reconciles which can be run by the EphemeralRunner controller.
  # Increase this value to improve the throughput of the controller.
  # It may also increase the load on the API server and the external service (e.g. GitHub API).
  runnerMaxConcurrentReconciles: 2

  # Defines how the controller should handle upgrades while having running jobs.
  # The strategies available are:
  # - "immediate": (default) The controller will immediately apply the change causing the recreation of the listener and ephemeral runner set.
  #   This can lead to an overprovisioning of runners, if there are pending / running jobs.
  #   This should not be a problem at a small scale, but it could lead to a significant increase of resources if you have a lot of jobs running concurrently.
  #
  # - "eventual": The controller will remove the listener and ephemeral runner set immediately,
  #   but will not recreate them (to apply changes) until all pending / running jobs have completed.
  #   This can lead to a longer time to apply the change but it will ensure that you don't have any overprovisioning of runners.
  updateStrategy: "eventual"

# Overrides the default `.Release.Namespace` for all resources in this chart.
namespaceOverride: ""
